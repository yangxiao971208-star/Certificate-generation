<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>感谢信 - aigo 绿色充电站</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Serif SC', serif;
            background: linear-gradient(135deg, #4CAF50 0%, #2E7D32 50%, #1B5E20 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 550px;
        }

        .input-section {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            display: none;
        }

        .input-section.active {
            display: block;
        }

        .input-section h1 {
            color: #2E7D32;
            font-size: 28px;
            margin-bottom: 10px;
            font-family: 'Ma Shan Zheng', cursive;
        }

        .input-section p {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }

        .input-group {
            margin-bottom: 25px;
        }

        .input-group input {
            width: 100%;
            padding: 15px 20px;
            font-size: 18px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            outline: none;
            transition: all 0.3s;
            font-family: 'Noto Serif SC', serif;
        }

        .input-group input:focus {
            border-color: #4CAF50;
            box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.2);
        }

        .btn-generate {
            background: linear-gradient(135deg, #4CAF50 0%, #2E7D32 100%);
            color: white;
            border: none;
            padding: 15px 50px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Noto Serif SC', serif;
            font-weight: 600;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(76, 175, 80, 0.4);
        }

        .letter-section {
            display: none;
        }

        .letter-section.active {
            display: block;
        }

        .letter {
            background: linear-gradient(to bottom, #FFFDE7 0%, #FFF9C4 100%);
            border-radius: 15px;
            padding: 50px 40px;
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .letter::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 31px,
                    #E0E0E0 31px,
                    #E0E0E0 32px
                );
            pointer-events: none;
            opacity: 0.3;
        }

        .letter-content {
            position: relative;
            z-index: 1;
        }

        .letter-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .letter-title {
            font-size: 36px;
            color: #2E7D32;
            font-family: 'Ma Shan Zheng', cursive;
            letter-spacing: 8px;
        }

        .letter-body {
            font-size: 17px;
            line-height: 2.2;
            color: #333;
        }

        .greeting {
            font-size: 20px;
            margin-bottom: 25px;
            font-weight: 600;
        }

        .user-name {
            color: #2E7D32;
            font-size: 24px;
            font-weight: 700;
            font-family: 'Ma Shan Zheng', cursive;
        }

        .highlight {
            color: #E65100;
            font-weight: 600;
        }

        .donation-amount {
            color: #D32F2F;
            font-size: 22px;
            font-weight: 700;
        }

        .letter-footer {
            margin-top: 40px;
            text-align: right;
        }

        .brand-name {
            color: #2E7D32;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .letter-date {
            font-size: 16px;
            color: #666;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-download {
            background: linear-gradient(135deg, #4CAF50 0%, #2E7D32 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Noto Serif SC', serif;
            font-weight: 600;
        }

        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(76, 175, 80, 0.4);
        }

        .btn-share {
            background: white;
            color: #2E7D32;
            border: 2px solid #4CAF50;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Noto Serif SC', serif;
            font-weight: 600;
        }

        .btn-share:hover {
            background: #4CAF50;
            color: white;
        }

        @media (max-width: 550px) {
            .letter {
                padding: 35px 25px;
            }

            .letter-title {
                font-size: 28px;
                letter-spacing: 5px;
            }

            .letter-body {
                font-size: 15px;
                line-height: 2;
            }

            .btn-group {
                flex-direction: column;
            }

            .btn-group button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="input-section active" id="inputSection">
            <h1>💚 感谢您的爱心</h1>
            <p>感谢您选择 aigo 绿色充电站礼盒</p>
            <div class="input-group">
                <input type="text" id="donorName" placeholder="请输入您的昵称" maxlength="20">
            </div>
            <button class="btn-generate" onclick="generateLetter()">查看感谢信</button>
        </div>

        <div class="letter-section" id="letterSection">
            <div class="letter" id="letter">
                <div class="letter-content">
                    <div class="letter-header">
                        <div class="letter-title">感谢信</div>
                    </div>

                    <div class="letter-body">
                        <div class="greeting">
                            嗨 <span class="user-name" id="displayName"></span>：
                        </div>

                        <p>今天，有个小朋友因为您，多吃了一顿饭。</p>

                        <p>
                            您选择 <span class="highlight">aigo 绿色充电站礼盒</span>的这份善意，
                            让我们共同向 <span class="highlight">中国社会福利基金会</span><br>
                            免费午餐基金捐赠了 <span class="donation-amount">¥6</span>。
                        </p>

                        <p>
                            不多，但足够让一个孩子<br>
                            中午不再饿着肚子上课。
                        </p>

                        <p>
                            感谢您和 <span class="highlight">aigo</span> 一起，<br>
                            为绿色生活充电，也为孩子们的午餐充电。
                        </p>
                    </div>

                    <div class="letter-footer">
                        <div class="brand-name">aigo 绿色充电站</div>
                        <div class="letter-date" id="letterDate"></div>
                    </div>
                </div>
            </div>

            <div class="btn-group">
                <button class="btn-download" onclick="downloadLetter()">📥 保存感谢信</button>
                <button class="btn-share" onclick="shareLetter()">📤 分享爱心</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
        let currentName = '';
        let currentDate = '';

        window.onload = function() {
            const savedName = localStorage.getItem('donorName');
            const savedDate = localStorage.getItem('letterDate');

            if (savedName && savedDate) {
                currentName = savedName;
                currentDate = savedDate;
                document.getElementById('displayName').textContent = savedName;
                document.getElementById('letterDate').textContent = savedDate;
                document.getElementById('inputSection').classList.remove('active');
                document.getElementById('letterSection').classList.add('active');
            }
        };

        function generateLetter() {
            const nameInput = document.getElementById('donorName');
            const name = nameInput.value.trim();

            if (!name) {
                alert('请输入您的昵称');
                nameInput.focus();
                return;
            }

            if (name.length < 2) {
                alert('昵称至少需要2个字符');
                nameInput.focus();
                return;
            }

            currentName = name;
            currentDate = formatDate(new Date());

            localStorage.setItem('donorName', name);
            localStorage.setItem('letterDate', currentDate);

            document.getElementById('displayName').textContent = name;
            document.getElementById('letterDate').textContent = currentDate;

            document.getElementById('inputSection').classList.remove('active');
            document.getElementById('letterSection').classList.add('active');
        }

        function formatDate(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}年${month}月${day}日`;
        }

        function isWeChat() {
            const ua = navigator.userAgent.toLowerCase();
            return ua.indexOf('micromessenger') !== -1;
        }

        function downloadLetter() {
            const letter = document.getElementById('letter');

            html2canvas(letter, {
                scale: 2,
                useCORS: true,
                backgroundColor: '#FFFDE7',
                logging: false
            }).then(canvas => {
                const imgData = canvas.toDataURL('image/png');

                if (isWeChat()) {
                    showSaveImageModal(imgData);
                } else {
                    const link = document.createElement('a');
                    link.download = `感谢信_${currentName}_${currentDate}.png`;
                    link.href = imgData;
                    link.click();
                }
            }).catch(error => {
                console.error('下载失败:', error);
                alert('下载失败，请重试');
            });
        }

        function shareLetter() {
            const letter = document.getElementById('letter');

            html2canvas(letter, {
                scale: 2,
                useCORS: true,
                backgroundColor: '#FFFDE7',
                logging: false
            }).then(canvas => {
                const imgData = canvas.toDataURL('image/png');

                if (isWeChat()) {
                    showSaveImageModal(imgData, true);
                } else if (navigator.share) {
                    canvas.toBlob(blob => {
                        const file = new File([blob], `感谢信_${currentName}.png`, {
                            type: 'image/png'
                        });

                        navigator.share({
                            title: '感谢信 - aigo 绿色充电站',
                            text: '感谢您和 aigo 一起，为绿色生活充电，也为孩子们的午餐充电！',
                            files: [file]
                        }).catch(error => {
                            console.error('分享失败:', error);
                            alert('分享失败，请重试');
                        });
                    });
                } else {
                    showSaveImageModal(imgData);
                }
            }).catch(error => {
                console.error('分享失败:', error);
                alert('分享失败，请重试');
            });
        }

        function showSaveImageModal(imgData, isShare = false) {
            const modal = document.createElement('div');
            modal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0,0,0,0.9);
                z-index: 99999;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 20px;
            `;

            const img = document.createElement('img');
            img.src = imgData;
            img.style.cssText = `
                max-width: 100%;
                max-height: 80vh;
                margin-bottom: 20px;
            `;

            const tip = document.createElement('div');
            tip.innerHTML = isShare ?
                '<p style="color: white; text-align: center; font-size: 18px;">💚 长按图片保存到相册<br>分享您的爱心故事</p>' :
                '<p style="color: white; text-align: center; font-size: 18px;">💚 长按图片保存到相册</p>';

            const closeBtn = document.createElement('button');
            closeBtn.textContent = '关闭';
            closeBtn.style.cssText = `
                margin-top: 20px;
                padding: 12px 40px;
                background: #4CAF50;
                color: white;
                border: none;
                border-radius: 25px;
                font-size: 16px;
                cursor: pointer;
            `;
            closeBtn.onclick = () => document.body.removeChild(modal);

            modal.appendChild(img);
            modal.appendChild(tip);
            modal.appendChild(closeBtn);
            document.body.appendChild(modal);
        }

        document.getElementById('donorName').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                generateLetter();
            }
        });
    </script>
</body>
</html>
